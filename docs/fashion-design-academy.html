const SESSION_KEY = 'fashion_app_session';
const PROGRESS_KEY = 'fashion_app_progress';
const SCHEMA_VERSION = 1;

function emptyStageProgress(){
  return { lessonsRead: [], gameCompleted:false, gameBestScore:null, quizBestScore:null, quizPassed:false, completedAt:null };
}

function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function saveSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

function loadProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(parsed.version !== SCHEMA_VERSION) return null;
    return parsed;
  }catch(e){ return null; }
}
function saveProgress(p){
  p.updatedAt = new Date().toISOString();
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}
function freshProgress(){
  return {
    version: SCHEMA_VERSION,
    currentStageId: 'stage-1',
    stages: {},
    glossary: { termStats:{}, bestScorePercent:null },
    updatedAt: null
  };
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0,n); }

const { createApp, reactive, computed, onMounted, ref } = Vue;

/* ---------------------- Reusable: Quiz Runner ---------------------- */
const QuizRunner = {
  props: ['questions','passThreshold'],
  emits: ['finished'],
  setup(props, { emit }){
    const answers = reactive({});
    const submitted = ref(false);
    const score = ref(0);

    function select(qid, idx){
      if(submitted.value) return;
      answers[qid] = idx;
    }
    function selectBool(qid, val){
      if(submitted.value) return;
      answers[qid] = val;
    }
    function submit(){
      let correct = 0;
      props.questions.forEach(q=>{
        if(q.type==='mcq'){
          if(answers[q.id]===q.answerIndex) correct++;
        } else if(q.type==='true_false'){
          if(answers[q.id]===q.answer) correct++;
        }
      });
      score.value = Math.round((correct/props.questions.length)*100);
      submitted.value = true;
      emit('finished', score.value);
    }
    function retry(){
      Object.keys(answers).forEach(k=>delete answers[k]);
      submitted.value = false;
      score.value = 0;
    }
    const allAnswered = computed(()=> props.questions.every(q=> answers[q.id]!==undefined));
    const passed = computed(()=> score.value >= props.passThreshold);

    return { answers, submitted, score, select, selectBool, submit, retry, allAnswered, passed };
  },
  template: `
    <div>
      <div v-if="submitted" :class="['quiz-result-banner', passed ? 'pass':'fail']">
        Natija: {{ score }}% — {{ passed ? "O'tdingiz! 🎉" : "O'tmadingiz, qayta urinib ko'ring" }}
        <div style="font-weight:400; font-size:0.85rem; margin-top:4px;">O'tish balli: {{ passThreshold }}%</div>
      </div>
      <div v-for="q in questions" :key="q.id" class="quiz-question">
        <div style="font-weight:600; margin-bottom:6px;">{{ q.question }}</div>
        <template v-if="q.type==='mcq'">
          <div v-for="(opt,idx) in q.options" :key="idx"
               class="quiz-option"
               :class="{
                 selected: answers[q.id]===idx && !submitted,
                 correct: submitted && idx===q.answerIndex,
                 incorrect: submitted && answers[q.id]===idx && idx!==q.answerIndex
               }"
               @click="select(q.id, idx)">
            {{ opt }}
          </div>
        </template>
        <template v-else-if="q.type==='true_false'">
          <div class="quiz-option"
               :class="{selected: answers[q.id]===true && !submitted, correct: submitted && q.answer===true, incorrect: submitted && answers[q.id]===true && q.answer!==true}"
               @click="selectBool(q.id, true)">To'g'ri</div>
          <div class="quiz-option"
               :class="{selected: answers[q.id]===false && !submitted, correct: submitted && q.answer===false, incorrect: submitted && answers[q.id]===false && q.answer!==false}"
               @click="selectBool(q.id, false)">Noto'g'ri</div>
        </template>
      </div>
      <button v-if="!submitted" class="btn-primary btn-block" :disabled="!allAnswered" @click="submit">Tekshirish</button>
      <button v-else class="btn-secondary btn-block" @click="retry">Qayta urinish</button>
    </div>
  `
};

/* ---------------------- Game: Matching ---------------------- */
const MatchingGame = {
  props:['config'],
  emits:['finished'],
  setup(props,{emit}){
    const pairs = props.config.pairs.map((p,i)=>({ id:i, left:p.left, right:p.right }));
    const leftItems = ref(shuffle(pairs));
    const rightItems = ref(shuffle(pairs));
    const selectedLeft = ref(null);
    const matched = ref(new Set());
    const wrongFlash = ref(null);

    function clickLeft(item){
      if(matched.value.has(item.id)) return;
      selectedLeft.value = item;
    }
    function clickRight(item){
      if(matched.value.has(item.id)) return;
      if(!selectedLeft.value) return;
      if(selectedLeft.value.id === item.id){
        matched.value.add(item.id);
        matched.value = new Set(matched.value);
        selectedLeft.value = null;
        if(matched.value.size === pairs.length){
          emit('finished', 100);
        }
      } else {
        wrongFlash.value = item.id;
        setTimeout(()=>{ wrongFlash.value=null; }, 500);
        selectedLeft.value = null;
      }
    }
    const done = computed(()=> matched.value.size === pairs.length);
    return { leftItems, rightItems, selectedLeft, matched, clickLeft, clickRight, done, wrongFlash };
  },
  template: `
    <div>
      <div v-for="l in leftItems" :key="'l'+l.id" class="match-row">
        <div class="match-pill" :class="{selected: selectedLeft && selectedLeft.id===l.id, matched: matched.has(l.id)}" @click="clickLeft(l)">{{ l.left }}</div>
      </div>
      <div style="height:14px;"></div>
      <div v-for="r in rightItems" :key="'r'+r.id" class="match-row">
        <div class="match-pill" :class="{matched: matched.has(r.id)}" @click="clickRight(r)" style="background: rgb(253 244 232);">{{ r.right }}</div>
      </div>
      <div v-if="done" style="text-align:center; margin-top:14px; color:var(--good); font-weight:700;">Barcha juftlar topildi! 🎉</div>
    </div>
  `
};

/* ---------------------- Game: Ordering (croquis build / dart pivot steps) ---------------------- */
const OrderingGame = {
  props:['config','kind'],
  emits:['finished'],
  setup(props,{emit}){
    let items;
    if(props.kind === 'drag_build'){
      items = props.config.pieces.map(p=>({ id:p.id, label:p.label, correct:p.correctUnit }));
      items = shuffle(items).map((it,i)=>({...it, chosen: null}));
    } else {
      items = props.config.steps.map((s,i)=>({ id:i, label:s, correct:i+1 }));
      items = shuffle(items).map((it,i)=>({...it, chosen:null}));
    }
    const list = ref(items);
    const submitted = ref(false);
    const isDragBuild = props.kind === 'drag_build';

    function move(idx, dir){
      const newIdx = idx+dir;
      if(newIdx<0 || newIdx>=list.value.length) return;
      const arr = list.value.slice();
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      list.value = arr;
    }
    function assignUnit(item, unit){
      item.chosen = unit;
    }
    function submit(){ submitted.value = true;
      const correctCount = list.value.filter((it,i)=> isDragBuild ? it.chosen===it.correct : i+1===it.correct).length;
      const score = Math.round((correctCount/list.value.length)*100);
      emit('finished', score);
    }
    function retry(){
      submitted.value = false;
      list.value = shuffle(list.value).map(it=>({...it, chosen:null}));
    }
    const allAssigned = computed(()=> !isDragBuild || list.value.every(it=>it.chosen!==null));

    return { list, submitted, move, assignUnit, submit, retry, isDragBuild, allAssigned };
  },
  template: `
    <div>
      <template v-if="isDragBuild">
        <div v-for="it in list" :key="it.id" class="order-item" :class="{correct: submitted && it.chosen===it.correct, incorrect: submitted && it.chosen!==it.correct}">
          <span>{{ it.label }}</span>
          <select :disabled="submitted" @change="assignUnit(it, Number($event.target.value))" style="padding:6px; border-radius:6px;">
            <option value="" selected disabled>Unit?</option>
            <option v-for="n in 9" :value="n" :key="n">{{ n }}</option>
          </select>
        </div>
      </template>
      <template v-else>
        <p style="color:var(--muted); font-size:0.88rem;">To'g'ri tartibda joylashtirish uchun ↑ ↓ tugmalaridan foydalaning.</p>
        <ol class="order-list">
          <li v-for="(it,idx) in list" :key="it.id" class="order-item" :class="{correct: submitted && idx+1===it.correct, incorrect: submitted && idx+1!==it.correct}">
            <span>{{ it.label }}</span>
            <span class="order-controls" v-if="!submitted">
              <button class="btn-ghost btn-sm" @click="move(idx,-1)">↑</button>
              <button class="btn-ghost btn-sm" @click="move(idx,1)">↓</button>
            </span>
          </li>
        </ol>
      </template>
      <button v-if="!submitted" class="btn-primary btn-block" :disabled="!allAssigned" @click="submit">Tekshirish</button>
      <button v-else class="btn-secondary btn-block" @click="retry">Qayta urinish</button>
    </div>
  `
};

/* ---------------------- Game: Perception Challenge (color) ---------------------- */
const PerceptionGame = {
  props:['config'],
  emits:['finished'],
  setup(props,{emit}){
    const rounds = props.config.rounds;
    const idx = ref(0);
    const correctCount = ref(0);
    const answered = ref(false);
    const lastCorrect = ref(null);
    const done = ref(false);

    function answer(sameColor){
      // correct answer is always "yes, same color, but perception differs"
      answered.value = true;
      const isRight = sameColor === true;
      lastCorrect.value = isRight;
      if(isRight) correctCount.value++;
    }
    function next(){
      if(idx.value+1 < rounds.length){
        idx.value++; answered.value=false; lastCorrect.value=null;
      } else {
        done.value = true;
        const score = Math.round((correctCount.value/rounds.length)*100);
        emit('finished', score);
      }
    }
    const current = computed(()=> rounds[idx.value]);
    return { rounds, idx, current, answered, lastCorrect, answer, next, done, correctCount };
  },
  template: `
    <div style="text-align:center;">
      <div v-if="!done">
        <p style="color:var(--muted);">Savol {{ idx+1 }} / {{ rounds.length }}</p>
        <div class="swatch-row">
          <div class="swatch-box" :style="{background: current.backgroundA}">
            <div class="swatch-inner" :style="{background: current.color}"></div>
          </div>
          <div class="swatch-box" :style="{background: current.backgroundB}">
            <div class="swatch-inner" :style="{background: current.color}"></div>
          </div>
        </div>
        <p><b>Savol:</b> Bu ikkala kvadratcha aynan bir xil rangdami (garchi ko'zga boshqacha ko'rinsa ham)?</p>
        <div v-if="!answered" style="display:flex; gap:12px; justify-content:center;">
          <button class="btn-primary" @click="answer(true)">Ha, bir xil rang</button>
          <button class="btn-ghost" @click="answer(false)">Yo'q, boshqa rang</button>
        </div>
        <div v-else>
          <p :style="{color: lastCorrect ? 'var(--good)' : 'var(--bad)'}">
            {{ lastCorrect ? "To'g'ri! Ikkalasi ham bir xil rang — fon uni boshqacha ko'rsatadi." : "Noto'g'ri — aslida ikkalasi ham AYNAN bir xil rang, faqat fon ta'sirida boshqacha ko'rinadi." }}
          </p>
          <button class="btn-secondary" @click="next">{{ idx+1 < rounds.length ? 'Keyingisi' : 'Yakunlash' }}</button>
        </div>
      </div>
      <div v-else style="color:var(--good); font-weight:700;">Sinov tugadi! To'g'ri javoblar: {{ correctCount }} / {{ rounds.length }}</div>
    </div>
  `
};

/* ---------------------- Game: Slider Spread (slash-and-spread) ---------------------- */
const SliderSpreadGame = {
  props:['config'],
  emits:['finished'],
  setup(props,{emit}){
    const spread = ref(0);
    const max = props.config.maxSpreadCm || 5;
    const finished = ref(false);
    function complete(){
      finished.value = true;
      emit('finished', 100);
    }
    const gapPx = computed(()=> 10 + spread.value*14);
    return { spread, max, complete, finished, gapPx };
  },
  template: `
    <div style="text-align:center;">
      <p class="game-instructions">Slaydderni suring va tekis lekalo qanday qilib hajm olishini kuzating.</p>
      <div class="spread-diagram">
        <svg width="320" height="180" viewBox="0 0 320 180">
          <rect x="20" y="20" :width="60" height="140" fill="#e9c9a8" stroke="#b5651d" stroke-width="2"/>
          <rect :x="80+gapPx" y="20" width="60" height="140" fill="#e9c9a8" stroke="#b5651d" stroke-width="2"/>
          <rect :x="140+gapPx*2" y="20" width="60" height="140" fill="#e9c9a8" stroke="#b5651d" stroke-width="2"/>
          <path :d="'M 80 20 Q ' + (80+gapPx/2) + ' 0 ' + (80+gapPx) + ' 20'" fill="none" stroke="#b23b3b" stroke-width="2" v-if="spread>0"/>
          <path :d="'M 140+' + gapPx + ' 20 Q ' + (140+gapPx*1.5) + ' 0 ' + (140+gapPx*2) + ' 20'" fill="none" stroke="#b23b3b" stroke-width="2" v-if="spread>0"/>
        </svg>
      </div>
      <div class="slider-wrap">
        <input type="range" min="0" :max="max" step="0.5" v-model.number="spread" :disabled="finished">
        <p>Yoyilgan bo'shliq: {{ spread }} sm</p>
      </div>
      <button v-if="!finished" class="btn-primary" :disabled="spread < max/2" @click="complete">Natijani saqlash</button>
      <div v-else style="color:var(--good); font-weight:700;">Ajoyib! Hajm qanday paydo bo'lishini ko'rdingiz. 🎉</div>
    </div>
  `
};

/* ---------------------- Game: Pattern Pick (repeat type) ---------------------- */
function repeatDots(type){
  // returns list of {x,y} for a small preview grid, based on repeat type
  const pts = [];
  const positions = type==='half_drop'
    ? [[10,10],[10,40],[10,70],[40,25],[40,55],[40,85],[70,10],[70,40],[70,70]]
    : [[10,10],[10,40],[10,70],[40,10],[40,40],[40,70],[70,10],[70,40],[70,70]];
  return positions;
}
const PatternPickGame = {
  props:['config'],
  emits:['finished'],
  setup(props,{emit}){
    const options = [
      { id:'block', label:'Block Repeat', dots: repeatDots('block') },
      { id:'half_drop', label:'Half-Drop Repeat', dots: repeatDots('half_drop') }
    ];
    const selected = ref(null);
    const submitted = ref(false);
    function choose(opt){
      if(submitted.value) return;
      selected.value = opt.id;
    }
    function submit(){
      submitted.value = true;
      const correct = selected.value === (props.config.repeatType || 'half_drop');
      emit('finished', correct ? 100 : 40);
    }
    return { options, selected, submitted, choose, submit, target: props.config.repeatType };
  },
  template: `
    <div style="text-align:center;">
      <p class="game-instructions">Quyidagi ikkita naqsh tartibidan qaysi biri "Half-Drop Repeat" ekanini toping.</p>
      <div class="pattern-pick-row">
        <div v-for="opt in options" :key="opt.id" class="pattern-option"
             :class="{selected: selected===opt.id && !submitted, correct: submitted && opt.id==='half_drop', incorrect: submitted && selected===opt.id && opt.id!=='half_drop'}"
             @click="choose(opt)">
          <svg width="90" height="100" viewBox="0 0 90 100">
            <circle v-for="(p,i) in opt.dots" :key="i" :cx="p[0]" :cy="p[1]" r="6" fill="#b5651d"/>
          </svg>
          <span>{{ opt.label }}</span>
        </div>
      </div>
      <button v-if="!submitted" class="btn-primary" :disabled="!selected" @click="submit">Tekshirish</button>
      <div v-else style="margin-top:10px; font-weight:700;" :style="{color: selected==='half_drop' ? 'var(--good)':'var(--bad)'}">
        {{ selected==='half_drop' ? "To'g'ri!" : "Noto'g'ri — to'g'ri javob Half-Drop Repeat edi." }}
      </div>
    </div>
  `
};

/* ---------------------- Game: Brand Simulator ---------------------- */
const BrandSimulatorGame = {
  props:['config'],
  emits:['finished'],
  setup(props,{emit}){
    const form = reactive({ brandName:'', marketTier:null, differentiation:null, costOfGoods:null });
    const done = ref(false);
    function chooseTier(t){ form.marketTier = t; }
    function chooseDiff(d){ form.differentiation = d; }
    const wholesale = computed(()=> form.costOfGoods ? Math.round(form.costOfGoods*2) : 0);
    const retail = computed(()=> form.costOfGoods ? Math.round(form.costOfGoods*4) : 0);
    const canSubmit = computed(()=> form.brandName && form.marketTier && form.differentiation && form.costOfGoods > 0);
    function submit(){
      done.value = true;
      emit('finished', 100);
    }
    return { form, chooseTier, chooseDiff, wholesale, retail, canSubmit, submit, done, options: props.config.steps };
  },
  template: `
    <div>
      <div class="brand-step">
        <label>Brend nomini kiriting</label>
        <input type="text" v-model="form.brandName" :disabled="done" placeholder="Masalan: Bahor Studio">
      </div>
      <div class="brand-step">
        <label>Narx darajasini tanlang</label>
        <div class="choice-row">
          <button v-for="t in ['Contemporary','Bridge','Designer/Luxury']" :key="t" class="choice-btn" :class="{chosen: form.marketTier===t}" :disabled="done" @click="chooseTier(t)">{{ t }}</button>
        </div>
      </div>
      <div class="brand-step">
        <label>Fast fashion'dan qanday farqlanasiz?</label>
        <div class="choice-row">
          <button v-for="d in ['Hunarmandchilik sifati','Milliy naqshlar','Barqarorlik']" :key="d" class="choice-btn" :class="{chosen: form.differentiation===d}" :disabled="done" @click="chooseDiff(d)">{{ d }}</button>
        </div>
      </div>
      <div class="brand-step">
        <label>Bitta mahsulot tannarxi (so'mda)</label>
        <input type="number" v-model.number="form.costOfGoods" :disabled="done" placeholder="Masalan: 50000">
      </div>
      <div class="result-card" v-if="form.costOfGoods > 0">
        <div class="row"><span>Tannarx</span><span>{{ form.costOfGoods.toLocaleString() }} so'm</span></div>
        <div class="row"><span>Wholesale narx (x2)</span><span>{{ wholesale.toLocaleString() }} so'm</span></div>
        <div class="row"><span>Retail narx (x4)</span><span>{{ retail.toLocaleString() }} so'm</span></div>
      </div>
      <button v-if="!done" class="btn-primary btn-block" style="margin-top:16px;" :disabled="!canSubmit" @click="submit">Brend rejasini yakunlash</button>
      <div v-else style="text-align:center; margin-top:14px; color:var(--good); font-weight:700;">"{{ form.brandName }}" brendi rejasi tayyor! 🎉</div>
    </div>
  `
};

/* ---------------------- Game Runner switch ---------------------- */
const GameRunner = {
  props:['game'],
  emits:['finished'],
  components:{ MatchingGame, OrderingGame, PerceptionGame, SliderSpreadGame, PatternPickGame, BrandSimulatorGame },
  template: `
    <div class="game-shell">
      <h3 style="margin-top:0;">{{ game.title }}</h3>
      <p class="game-instructions">{{ game.instructions }}</p>
      <MatchingGame v-if="game.type==='matching'" :config="game.config" @finished="$emit('finished',$event)" />
      <OrderingGame v-else-if="game.type==='drag_build'" :config="game.config" kind="drag_build" @finished="$emit('finished',$event)" />
      <OrderingGame v-else-if="game.type==='rotate_puzzle'" :config="game.config" kind="steps" @finished="$emit('finished',$event)" />
      <PerceptionGame v-else-if="game.type==='perception_challenge'" :config="game.config" @finished="$emit('finished',$event)" />
      <SliderSpreadGame v-else-if="game.type==='interactive_diagram'" :config="game.config" @finished="$emit('finished',$event)" />
      <PatternPickGame v-else-if="game.type==='tile_matching'" :config="game.config" @finished="$emit('finished',$event)" />
      <BrandSimulatorGame v-else-if="game.type==='brand_simulator'" :config="game.config" @finished="$emit('finished',$event)" />
      <MatchingGame v-else-if="game.type==='point_placement'"
        :config="{pairs: game.config.points.map(p=>({left:p.label, right:'Landmark: '+p.label}))}"
        @finished="$emit('finished',$event)" />
      <div v-else style="color:var(--muted);">Bu o'yin turi hali qo'llab-quvvatlanmaydi.</div>
    </div>
  `
};

/* ---------------------- Root App ---------------------- */
const App = {
  components: { QuizRunner, GameRunner },
  setup(){
    const session = reactive({ name: null });
    const progress = reactive(freshProgress());
    const view = ref('login');
    const currentStageId = ref(null);
    const stageTab = ref('learn');
    const nameInput = ref('');
    const glossaryQuestions = ref([]);
    const openLessonId = ref(null);

    onMounted(()=>{
      const s = loadSession();
      const p = loadProgress();
      if(p) Object.assign(progress, p);
      if(s && s.name){
        session.name = s.name;
        view.value = 'map';
      } else {
        view.value = 'login';
      }
    });

    function persist(){ saveProgress(JSON.parse(JSON.stringify(progress))); }

    function login(){
      if(!nameInput.value.trim()) return;
      session.name = nameInput.value.trim();
      saveSession({ name: session.name, createdAt: new Date().toISOString() });
      view.value = 'map';
    }
    function logout(){
      clearSession();
      session.name = null;
      view.value = 'login';
      nameInput.value = '';
    }
    function resetProgress(){
      if(!confirm("Butun progressni o'chirmoqchimisiz? Bu qaytarib bo'lmaydi.")) return;
      localStorage.removeItem(PROGRESS_KEY);
      Object.assign(progress, freshProgress());
    }

    function stageProgress(stageId){
      if(!progress.stages[stageId]) progress.stages[stageId] = emptyStageProgress();
      return progress.stages[stageId];
    }
    function isUnlocked(order){
      if(order === 1) return true;
      const prevStage = STAGES.find(s=>s.order===order-1);
      return !!(progress.stages[prevStage.id] && progress.stages[prevStage.id].completedAt);
    }
    function stagePercent(stage){
      const sp = stageProgress(stage.id);
      let total = stage.lessons.length + 2; // lessons + game + quiz
      let done = sp.lessonsRead.length + (sp.gameCompleted?1:0) + (sp.quizPassed?1:0);
      return Math.round((done/total)*100);
    }
    const overallPercent = computed(()=>{
      const done = STAGES.filter(s=> progress.stages[s.id] && progress.stages[s.id].completedAt).length;
      return Math.round((done/STAGES.length)*100);
    });
    const allCompleted = computed(()=> STAGES.every(s=> progress.stages[s.id] && progress.stages[s.id].completedAt));

    function openStage(stage){
      if(!isUnlocked(stage.order)) return;
      currentStageId.value = stage.id;
      stageTab.value = 'learn';
      openLessonId.value = null;
      view.value = 'stage';
    }
    function goMap(){ view.value = 'map'; currentStageId.value = null; }
    const currentStage = computed(()=> STAGES.find(s=>s.id===currentStageId.value));

    function toggleLesson(lessonId){
      openLessonId.value = openLessonId.value===lessonId ? null : lessonId;
      const sp = stageProgress(currentStageId.value);
      if(!sp.lessonsRead.includes(lessonId)){
        sp.lessonsRead.push(lessonId);
        persist();
      }
    }

    function checkStageCompletion(stageId){
      const sp = stageProgress(stageId);
      if(sp.gameCompleted && sp.quizPassed && !sp.completedAt){
        sp.completedAt = new Date().toISOString();
      }
    }
    function onGameFinished(score){
      const sp = stageProgress(currentStageId.value);
      sp.gameCompleted = true;
      sp.gameBestScore = Math.max(sp.gameBestScore||0, score);
      checkStageCompletion(currentStageId.value);
      persist();
    }
    function onQuizFinished(score){
      const sp = stageProgress(currentStageId.value);
      sp.quizBestScore = Math.max(sp.quizBestScore||0, score);
      if(score >= currentStage.value.quiz.passThreshold) sp.quizPassed = true;
      checkStageCompletion(currentStageId.value);
      persist();
      if(allCompleted.value){
        setTimeout(()=>{ view.value='certificate'; }, 600);
      }
    }

    /* Glossary test */
    const unlockedStageOrders = computed(()=>{
      let orders = [1];
      for(let o=2;o<=8;o++){ if(isUnlocked(o)) orders.push(o); }
      return orders;
    });
    function buildGlossaryTest(){
      const stageIds = STAGES.filter(s=>unlockedStageOrders.value.includes(s.order)).map(s=>s.id);
      let pool = TERMS.filter(t=> stageIds.includes(t.stageId));
      // weight toward previously-wrong terms
      pool = pool.slice().sort((a,b)=>{
        const sa = progress.glossary.termStats[a.term];
        const sb = progress.glossary.termStats[b.term];
        const ra = sa ? sa.correct/Math.max(sa.seen,1) : -1;
        const rb = sb ? sb.correct/Math.max(sb.seen,1) : -1;
        return ra - rb;
      });
      const chosen = pool.slice(0, Math.min(10, pool.length));
      glossaryQuestions.value = chosen.map(t=>{
        const distractors = pick(pool.filter(p=>p.term!==t.term), Math.min(3, pool.length-1)).map(p=>p.definition);
        const options = shuffle([t.definition, ...distractors]);
        return {
          id: t.term,
          question: `"${t.term}" atamasining to'g'ri ta'rifi qaysi?`,
          type:'mcq',
          options,
          answerIndex: options.indexOf(t.definition)
        };
      });
    }
    function openGlossaryTest(){
      buildGlossaryTest();
      view.value = 'glossary';
    }
    function onGlossaryFinished(score){
      glossaryQuestions.value.forEach(q=>{
        const wasCorrect = true; // per-question detail not tracked individually here beyond overall score
      });
      progress.glossary.bestScorePercent = Math.max(progress.glossary.bestScorePercent||0, score);
      persist();
    }

    return {
      session, progress, view, nameInput, login, logout, resetProgress,
      STAGES, stageProgress, isUnlocked, stagePercent, overallPercent, allCompleted,
      openStage, goMap, currentStage, currentStageId, stageTab, openLessonId, toggleLesson,
      onGameFinished, onQuizFinished, openGlossaryTest, glossaryQuestions, onGlossaryFinished
    };
  },
  template: `
    <div>
      <div class="topbar" v-if="view!=='login'">
        <div class="brand" @click="goMap">Moda Dizayni Akademiyasi<span>8 bosqichlik interaktiv kurs</span></div>
        <div class="user-chip">
          <span class="progress-pill">{{ overallPercent }}% tugallandi</span>
          <b>{{ session.name }}</b>
          <button class="btn-ghost btn-sm" @click="openGlossaryTest">Atamalar sinovi</button>
          <button class="btn-ghost btn-sm" @click="logout">Chiqish</button>
        </div>
      </div>

      <main>
        <!-- LOGIN -->
        <div v-if="view==='login'" class="center-screen">
          <div class="card login-card">
            <h1>Xush kelibsiz! 🌸</h1>
            <p>Ismingizni kiriting, boshlaymiz</p>
            <input type="text" v-model="nameInput" placeholder="Ismingiz" @keyup.enter="login" autofocus>
            <button class="btn-primary btn-block" @click="login">Boshlash</button>
          </div>
        </div>

        <!-- STAGE MAP -->
        <div v-else-if="view==='map'">
          <h2 class="page-title">Salom, {{ session.name }}!</h2>
          <p class="subtitle">Quyidagi 8 bosqichdan birini tanlang.</p>
          <div class="stage-grid">
            <div v-for="stage in STAGES" :key="stage.id"
                 class="stage-card"
                 :class="{locked: !isUnlocked(stage.order), done: progress.stages[stage.id] && progress.stages[stage.id].completedAt}"
                 @click="openStage(stage)">
              <div class="lock-icon" v-if="!isUnlocked(stage.order)">🔒</div>
              <div class="lock-icon" v-else-if="progress.stages[stage.id] && progress.stages[stage.id].completedAt">✅</div>
              <div class="stage-num">{{ stage.order }}</div>
              <div class="stage-title">{{ stage.title }}</div>
              <div class="stage-desc">{{ stage.description }}</div>
              <div class="mini-bar"><div class="mini-bar-fill" :style="{width: stagePercent(stage)+'%'}"></div></div>
            </div>
          </div>
          <div style="text-align:center; margin-top:30px;">
            <button class="btn-secondary" @click="resetProgress">Progressni tozalash</button>
          </div>
        </div>

        <!-- STAGE DETAIL -->
        <div v-else-if="view==='stage' && currentStage">
          <div class="backbar"><button class="btn-ghost btn-sm" @click="goMap">← Bosqichlar xaritasi</button></div>
          <h2 class="page-title">{{ currentStage.order }}-Bosqich: {{ currentStage.title }}</h2>
          <p class="subtitle">{{ currentStage.description }}</p>
          <div class="tabs">
            <div class="tab" :class="{active: stageTab==='learn'}" @click="stageTab='learn'">📖 O'rganish</div>
            <div class="tab" :class="{active: stageTab==='play'}" @click="stageTab='play'">🎮 O'yin</div>
            <div class="tab" :class="{active: stageTab==='test'}" @click="stageTab='test'">📝 Test</div>
          </div>

          <div v-if="stageTab==='learn'">
            <div v-for="lesson in currentStage.lessons" :key="lesson.id" class="lesson-item">
              <div class="lesson-head" @click="toggleLesson(lesson.id)">
                <div class="lesson-head-left">
                  <div class="lesson-check" :class="{read: stageProgress(currentStage.id).lessonsRead.includes(lesson.id)}">
                    <span v-if="stageProgress(currentStage.id).lessonsRead.includes(lesson.id)">✓</span>
                  </div>
                  <b>{{ lesson.title }}</b>
                </div>
                <span>{{ openLessonId===lesson.id ? '▲' : '▼' }}</span>
              </div>
              <div class="lesson-body" v-if="openLessonId===lesson.id">
                <div class="lesson-image-placeholder">🖼️ Rasm: {{ lesson.image }}</div>
                <p>{{ lesson.body }}</p>
                <div class="exercise-box" v-if="lesson.exercise"><b>Amaliy mashq:</b> {{ lesson.exercise }}</div>
                <div v-if="lesson.terms && lesson.terms.length">
                  <div style="margin-top:12px; font-size:0.85rem; color:var(--muted);">Yangi atamalar:</div>
                  <span class="term-chip" v-for="t in lesson.terms" :key="t.term" :title="t.definition">{{ t.term }}</span>
                </div>
              </div>
            </div>
          </div>

          <div v-else-if="stageTab==='play'">
            <GameRunner :game="currentStage.game" @finished="onGameFinished" :key="currentStage.id" />
          </div>

          <div v-else-if="stageTab==='test'">
            <QuizRunner :questions="currentStage.quiz.questions" :passThreshold="currentStage.quiz.passThreshold" @finished="onQuizFinished" :key="currentStage.id" />
          </div>
        </div>

        <!-- GLOSSARY TEST -->
        <div v-else-if="view==='glossary'">
          <div class="backbar"><button class="btn-ghost btn-sm" @click="goMap">← Bosqichlar xaritasi</button></div>
          <h2 class="page-title">Atamalar Sinovi</h2>
          <p class="subtitle">Hozirgacha ochilgan bosqichlardagi barcha atamalar bo'yicha bilimingizni sinang.</p>
          <QuizRunner v-if="glossaryQuestions.length" :questions="glossaryQuestions" :passThreshold="70" @finished="onGlossaryFinished" />
          <p v-else>Hali yetarli atama mavjud emas.</p>
        </div>

        <!-- CERTIFICATE -->
        <div v-else-if="view==='certificate'" class="center-screen">
          <div class="certificate">
            <div class="stamp">🏆</div>
            <h1>Tabriklaymiz!</h1>
            <p>Siz Moda Dizayni Akademiyasining barcha 8 bosqichini muvaffaqiyatli tugatdingiz.</p>
            <div class="name">{{ session.name }}</div>
            <p style="color:var(--muted);">Endi o'z g'oyalaringizni real dunyoga olib chiqish vaqti keldi!</p>
            <button class="btn-primary" @click="goMap">Bosqichlarni qayta ko'rish</button>
          </div>
        </div>
      </main>

      <div class="footer-note" v-if="view!=='login'">Moda Dizayni Akademiyasi — barcha progress faqat shu brauzerda, localStorage'da saqlanadi.</div>
    </div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>
